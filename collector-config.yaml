# OpenTelemetry Collector Configuration for Cisco IOS XE MDT Telemetry
# Pipeline: C9300X gRPC Dial-Out → OTEL Collector → Splunk HEC

receivers:
  cisco_telemetry:
    listen_address: "0.0.0.0:57500"
    max_recv_msg_size_mib: 4
    max_concurrent_streams: 128
    keepalive:
      time: 30s
      timeout: 10s
    yang:
      enable_rfc_parser: true
      cache_modules: true
      max_modules: 1000

processors:
  batch:
    timeout: 2s
    send_batch_size: 1024

exporters:
  debug:
    verbosity: basic

  splunk_hec:
    endpoint: "https://127.0.0.1:8088/services/collector"
    token: "cisco-mdt-token"
    source: "cisco:mdt"
    sourcetype: "cisco:mdt:grpc"
    index: "cisco_mdt"
    tls:
      insecure_skip_verify: true

service:
  pipelines:
    metrics:
      receivers: [cisco_telemetry]
      processors: [batch]
      exporters: [splunk_hec, debug]

  telemetry:
    logs:
      level: info
